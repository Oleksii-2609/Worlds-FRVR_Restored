    <script>
      /* eslint-disable */
      window.onload = function () {
        if (window.parent.changelogHide) {
          document.getElementById('standalone').style.display = 'none';
        }
        function mdToHtml(str) {
          str = str.replace(/</g, '&lt;').replace(/>/g, '&gt;');
          if (!str) {
            return '<br/>';
          }
          if (str.startsWith('# ')) {
            return '<h1>' + str.slice(2) + '</h1>';
          }
          if (str.startsWith('## ')) {
            return '<h2>' + str.slice(3) + '</h2>';
          }
          if (str.startsWith('### ')) {
            return '<h3>' + str.slice(4) + '</h3>';
          }
          if (str.startsWith('• ')) {
            return '<div class="li1">' + str.slice(2) + '</div>';
          }
          if (str.startsWith('  ◦ ')) {
            return '<div class="li2">' + str.slice(4) + '</div>';
          }
          return '<div class="unknown">' + str + '</div>';
        }
        function styleLine(str) {
          str = str.replace(/`([^`]+)`/g, function (a, b) {
            return '<span class="code">' + b + '</span>';
          });
          str = str.replace(/\*\*(\S[^*]*\S)\*\*/g, function (a, b) {
            return '<b>' + b + '</b>';
          });
          str = str.replace(/\*(\S[^*]*\S)\*/g, function (a, b) {
            return '<i>' + b + '</i>';
          });
          return str;
        }
        function comments(str) {
          return !str.startsWith('//');
        }
        var src = document.getElementById('data').innerHTML.trim().split('\n').filter(comments);
        document.getElementById('content').innerHTML = src.map(mdToHtml).map(styleLine).join('');
      };
    </script>

# 2023-03-15 - ***More Gems, Builder Queue, New FRVR Account Backend*** - 0.72.1
• Add ability for Facebook users to buy gems with cash
• Add 3 free gems that can be claimed daily
• Change Captain and Skeleton Minion's gem prices to bring them in-line with the other outfits of the same rarity
• Change world limits so that if a world is "full" players can still join, but are demoted to visitors/spectators, and queue for the chance to be a builder/area builder/visitor.  An interface for managing this new "build queue" will be added later.
• Add `/build_queue_threshold` for configuring how many people in the queue are allowed to be builders at any time (max of 35 in Unlimited (temporarily), 4 in Lost Frontier)
// • Add `/build_queue_leave` to manually leave the build queue
// • Add `/build_queue_join` to manually join the build queue if left, removed or in a non-automatically queuing world
// • Add `/build_queue_position` to show your position in the build queue
• Add `/build_queue_promote` to promote someone to the front of the build queue (if possible, they'll get build access, someone else will lose it)
• Add `/build_queue_demote` to demote someone to the back of the build queue (allowing someone else build access, if any are waiting)
// • Add `/build_queue_kick` to kick someone from the build queue (they'll need to re-join manually)
// • Add `/build_queue_afk` to automatically kick AFK users from the build queue (they'll need to re-join manually) (default: no timeout)
// • Add `/build_queue_automatic` to set if a world automatically queues all builders or if they need to manually joined (not recommended until we add an interface for users to easily join the queue) (default: automatic)
• Add `/build_queue_chat` to set if users waiting in the queue are allowed to chat or not (default: allowed)
• Add `/build_queue_visit` to set waiting users to be visitors instead of spectators (default: visitors)
• Add `/build_queue_auto_promote` to automatically promote admins/owners upon entering the world (default: on)
• Allow setting Lost Frontier worlds to `Anyone can [Area] Build` (by default, any players after the first 4 to join will simply be visitors)
• Remove limit of 4 Builder roles assigned in Lost Frontier worlds (by default, any players after the first 4 to join will simply be visitors)
• Add integration to new FRVR Account backend and use it for new users
• Add configurable activation delay time to Waygates
• Add timestamp to downloaded Photo filenames

# 2022-06-06 - ***Access Areas*** - 0.65.1
## Major Changes
• New Feature: `Access Areas`
  ◦ World Admins and Owners can define designated Areas which limit or enable building
  ◦ New `Access Control` prop, under the Settlement category, that allows creating and editing Areas
  ◦ New `Area Builder` access level which can only build within designated Areas
  ◦ New `Anyone can Area Build` world access preset that defaults all users to Area Builders
  ◦ In an `Anyone can build` world, place Access Areas set to `Read-only (Visitor)` to protect important areas
  ◦ In an `Anyone can Area build` world, place Access Areas set to `Anyone can build` to allow people to build in just those Areas, or, assign individuals ownership of each Area for protected build spaces
  ◦ In Lost Frontier, each Settlement now has a built-in Access Area, so the owner can configure who is allowed to build or access chests/factories within it
## Notable Additions
• Lost Frontier: Allow building multiple Settlements
  ◦ You can only replenish energy or Waygate to your *Home* Settlement, buy can set a new Settlement as your home by visiting its Waygate, if you have build access there
  ◦ Settlements must be far enough apart that their maximum size / Access Areas cannot possibly overlap
• Remove limit on number of Waygate entryways per world
• Add new Veinium Grinder factory that grinds Veinium into ore based on the factory location
• Add new sound for opening Chests
• Add new sound for opening and closing Doors
• Add new sounds for jumping and landing
• Add new sound for entering water
• Add new sounds for harvesting plants
• Update several UI sounds
• Update sound for picking up items
## Little Things
• Rename `MEMBER` access to `BUILDER` for all commands to better match the interface
• Lost Frontier: Placing first Waygate is now free (so you can easily move the default Settlement or establish a new one)
• Lost Frontier: Reduce Settlement move/delete cooldown to 6 hours
• Lost Frontier: Adjust tutorial to better handle starting in a world where you do not have build access to the default Settlement
• Lost Frontier: Allow visitors and spectators to use Waygates to individual Settlements
• Adjust Settlement beams to be visible at closer distances
• Allow non-empty chests to be broken in Unlimited worlds without emptying contents first
• Add `/settlement_beam_dist` and `/settlement_beam_in_photo_mode` to configure how beams of light into Settlements are displayed
• Add `/world_area_clear` setting to set who is allowed to run *Clear Contents* on an Area (default: only owners)
• Add `/world_race_as_visitor` to configure whether builders should do races as world Visitors or not (default: on in Unlimited worlds)
• Add commands providing the same options as the Access Control interface: `/area_add`, `/area_delete`, `/area_access`, `/area_size`, `/area_shift`
• New settings to control which boundary grids are visible: `/show_area_bounds`, `/show_settlement_bounds`, and `/show_bounds` (affects both)
• New world access setting `/world_settlement` determines who can establish a new Settlement in a Lost Frontier world (default: BUILDER)
• Add check-mark icon to indicate default Waygate and home icon to indicate the Waygate to your home Settlement

# 2021-08-09 - ***Lost Frontier*** - 0.50.0
## Major Changes:
• Beginnings of a new game mode: `Lost Frontier`
  ◦ Craft, farm, explore, and upgrade!
  ◦ To get started, create a new world and choose the `Lost Frontier` mode
  ◦ All existing worlds are `Unlimited` worlds
  ◦ Lost Frontier worlds are currently limited to 4 players
  ◦ A number of features, like changing tool brush sizes, linking Waygates, and more players, will be unlockable in a later update
• Add an item information view to get details on the cost of anything buildable, or the recipe of anything craftable
• Add photo mode to share in-game snapshots with author and world information
## Notable Additions:
• Add Recent Updates to welcome screen
• New category of `Settlement` props (in Lost Frontier, most of these need to be unlocked through Settlement upgrades)
• New ores, metals, and alloys: Tin, Bronze, Iron, Emberyllium, Brightsteel, Cobalt, Mythril, Aetherstone, Aethersteel, Muttal
• New wooden chair props
• New crops: Tomato, Carrot, Pumpkin, Sugar cane, Red/Blue/Yellow Berry Bushes
## Little Things:
### User Interface
• Expose `/world_chat` setting in world info view
• Add Info button to Blueprint blue box interface to access the rename / share / etc buttons without needing to open the build menu
• Make build menu scrollable instead of paginated
• Add toggle between details view and icons view in the build menu
• Allow clicking on user id in most places to copy it to the clipboard
• Allow accessing the Waygate menus - Settlement Management, Energy Well, and Waygate editing - from the World Info screen even when not near the Waygate
• Show unlisted Waygates on the World Info screen to people with Waygate edit permissions
• Remove the "on solid ground" requirement from many props: doors, fences, chests, etc
• Add error message when trying to plant seeds on something invalid
• Allow placing intangible props over players (e.g. torch over self)
• Allow drag-place by clicking and then moving
• Change `E` to now never interact, just consistently open the menu
• Add `R` as hotkey to behave the same as clicking (interact / place / break / etc)
• Add `T` as hotkey to behave the same as toggling the mouse button down
• Add `G` as hotkey to only interact without possibly placing/breaking
• Add `PageUp`/`Down` as hotkey similar to mouse wheel - scrolls through quickbar and 3rd person zoom in/out
• Add `Backspace` as hotkey any time there's a "back" button
• Add `Delete` as hotkey to trash selected item in any inventory
• Trigger mouse look upon WASD/Arrow keys
• Add right-click to split an inventory stack
• Add middle-click to sort inventory
• Make some inventory mouse interactions more consistent
• Allow right click to exit most menus
• Allow clicking on empty space around a menu to close it
• Opening menu via clicking the button or pressing Escape now remembers your previous menu page
• Allow right click and double-click to select and immediately close the build menu
• Allow dropping items on your paper doll to equip or consume them
• Allow dropping tools on the gathering tools slot to equip them
• Display a hint about using a torch when it is dark, `/show_lighting_hint 0` disables this
• Remove red dot badge notifications for features older than this update
• Fix scroll area for chat to not automatically scroll when you are actively scrolled back in the history
• Fix unable to middle-click to 'pick' doors or flowers
• Fix pressing `1` in inventory causing crashing attempting to slot over gathering tools (bug credit: DragonDMS)
• Fix crash with larger brush sizes around props
• Fix unintentionally blocking `Ctrl+R` hotkey on Chrome/etc
• Fix various layout issues with the build menu's search tab on touch devices
• Fix double-tapping on touch to work like double-clicking
• Fix prop placement being very difficult with tall props
• Fix slight gap between drop-down menu entries
• Fix `Q` triggering quick-slot menu for read-only viewers (bug credit: Satera)
### Graphics
• Add sway to flowers
### Commands and Options
• Add `/playtime` and `/world_playtime` and `/world_playtime_all` to see your total playtime, your playtime in the current world, and all users' playtime in the current world, respectively, with time tracked as of this update
• Add `/stuck` and `I'm stuck!` button to the World Info screen that can be used if you are in a world_free_pos world or you are a world admin/owner, and the world is Unlimited or you have already tried using Waygates to get unstuck
• Add `Interactable UIs` and `Build Menu`: `Separate` or `Integrated` to customize when the quickbar and other menu tabs are shown, with fine-grain configuration available with `/split_factory`, `/split_container`, `/split_waygate`, `/split_build`, and `/quickbar_force_show`

# 2020-01-29 - Quickbar and Build Menu overhaul - Alpha 0.8.0
## Major Changes:
• Major new feature: Quickbar and Build/Blueprint Menu
  ◦ In preparation for editing blueprints, which will function similar to the current unlimited mode, the quickbar is now disconnected from your inventory, and things must be slotted into it
  ◦ You can quickly slot something into the "Recent" slot by middle-clicking on it in the world
  ◦ You can slot anything through the new Build menu (hotkey: B), which also allows you to see what resources are (or would be) required
  ◦ You can also slot things by right clicking or long-pressing any quickbar slot
  ◦ You can slot anything in your Inventory by dragging and dropping, or clicking to select an inventory item and then clicking to select a slot
  ◦ You can slot anything from the Build menu or Inventory by mousing over the item and pressing the hotkey of the slot (2-8)
  ◦ Any item selected in your inventory will get automatically slotted into the "Recent" slot
  ◦ In unlimited mode, you can now build into the world anything that is slotted in your quickbar even if it does not exist in your inventory
• Add debug toggle of Unlimited Mode to the options (default on for Alpha testing) - in the future this will be the mode active when editing blueprints, and probably as per-world option set when creating a world
• New feature: In unlimited mode, a single click/tap when using 1x1 brush size now instantly removes the block
• Major change: When placing more complex items, pay the cost in raw resources directly instead of requiring crafting the item
• Change destroying complex items in the world to drop the raw resources instead of the item itself
• Change destroying things in the world to no longer drop resources in unlimited mode
• Changed how buckets work: Buckets are now either entirely full or empty, no partial states (we'll likely add a specialized watering can for multi-use watering later). Buckets now stack in the inventory. The quickbar will automatically re-slot a full bucket over an empty one, or vice versa, when appropriate. In unlimited mode, you'll likely want to slot both a full and empty bucket into two separate slots.

• Make some textures more resilient against ISPs resizing them in-transit (bug credit: Pikapunchultri)

• Fix dragging the quickbar erroneously entering pointerlock mode
• Fix temporary consistency errors when mining with a ridiculous number of blocks flying around
• Fix crash from Avast extension showing up as a crash in our app
